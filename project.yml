name: StreamForge
options:
  bundleIdPrefix: com.majuz.streamforge
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

schemes:
  StreamForge:
    build:
      targets:
        StreamForge: all
        BroadcastExtension: all
    run:
      executable: StreamForge

packages:
  HaishinKit:
    url: https://github.com/shogo4405/HaishinKit.swift
    from: "2.0.8"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  StreamForge:
    type: application
    platform: iOS
    sources:
      - StreamForge
    dependencies:
      - package: HaishinKit
        product: HaishinKit
      - package: HaishinKit
        product: RTMPHaishinKit
      - target: BroadcastExtension
    settings:
      base:
        INFOPLIST_FILE: StreamForge/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.majuz.streamforge
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: 1
    entitlements:
      path: StreamForge/StreamForge.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.majuz.streamforge
    info:
      path: StreamForge/Resources/Info.plist
      properties:
        CFBundleDisplayName: StreamForge
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: "StreamForge needs camera access for live streaming"
        NSMicrophoneUsageDescription: "StreamForge needs microphone access for live streaming audio"
        UIBackgroundModes:
          - audio
          - processing
        ITSAppUsesNonExemptEncryption: false
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - "com.googleusercontent.apps.81118022282-eglkdokqs8qme2rkin5uda6laijp28kc"

  BroadcastExtension:
    type: app-extension
    platform: iOS
    sources:
      - BroadcastExtension
    dependencies:
      - package: HaishinKit
        product: HaishinKit
      - package: HaishinKit
        product: RTMPHaishinKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.majuz.streamforge.broadcast
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: 1
    entitlements:
      path: BroadcastExtension/BroadcastExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.majuz.streamforge
    info:
      path: BroadcastExtension/Info.plist
      properties:
        CFBundleDisplayName: StreamForge Broadcast
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.broadcast-services-upload
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).SampleHandler"
